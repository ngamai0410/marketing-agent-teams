# ─────────────────────────────────────────────
# LLM Provider
# Options: anthropic | openai | gemini
#
# anthropic → set ANTHROPIC_API_KEY in .env
# openai    → set OPENAI_API_KEY in .env
# gemini    → set GEMINI_API_KEY in .env
#             model examples: gemini-2.5-flash, gemini-2.5-pro
# ─────────────────────────────────────────────
llm:
  provider: gemini

# ─────────────────────────────────────────────
# Search Engine
# Options: brave | duckduckgo
# ─────────────────────────────────────────────
search:
  provider: brave            # needs BRAVE_API_KEY in .env | or: duckduckgo (free, less reliable)
  max_searches: 20           # shared per pipeline run — cost/rate-limit guard
  max_searches_per_agent: 8  # per agent — enforced in code; flash ignores prompt budgets

# ─────────────────────────────────────────────
# Per-agent model settings
# Stage 1 defaults to haiku (cheap dev/test)
# Switch to sonnet/opus after prompts are validated
# ─────────────────────────────────────────────
agents:
  # --- Market Research sub-agents (Stage 1) ---
  # Model options by provider:
  #   anthropic: claude-haiku-4-5 | claude-sonnet-4-6 | claude-opus-4-8
  #   openai:    gpt-4o-mini | gpt-4o
  #   gemini:    gemini-2.5-flash | gemini-2.5-pro
  audience_researcher:
    model: gemini-2.5-flash        # sub-agents return JSON as text (no write_file) — flash is safe here
    max_tokens: 16000

  competitor_analyst:
    model: gemini-2.5-flash
    max_tokens: 8096

  social_media_analyst:
    model: gemini-2.5-flash
    max_tokens: 8096

  synthesizer:
    model: gemini-2.5-pro          # no tools — pure synthesis; pro for report quality (30-page gate)
    max_tokens: 16000

  # --- Copy agents (Stage 3) ---
  avatar_builder:
    model: gemini-2.5-flash
    max_tokens: 8096

  positioning_strategist:
    model: gemini-2.5-pro
    max_tokens: 8096

  hook_generator:
    model: gemini-2.5-flash
    max_tokens: 8096

  script_writer:
    model: gemini-2.5-pro
    max_tokens: 16000

  static_copy_writer:
    model: gemini-2.5-flash
    max_tokens: 8096

  qa_reviewer:
    model: gemini-2.5-pro         # flash emits MALFORMED_FUNCTION_CALL even on small contexts here
    max_tokens: 8096

  feedback_analyst:
    model: gemini-2.5-flash
    max_tokens: 8096

  orchestrator:
    model: gemini-2.5-pro
    max_tokens: 8096

# ─────────────────────────────────────────────
# Web dashboard (python -m embroidery.web)
# Live agent monitoring + human-in-the-loop QC gates. Localhost, single-user.
# ─────────────────────────────────────────────
web:
  host: 127.0.0.1
  port: 8765
  open_browser: true        # auto-open the browser on launch (--no-browser overrides)

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
# Resolved relative to PROJECT_ROOT (the outer embroidery/ dir) — CWD-independent.
paths:
  output: data/output
  brand_ai: data/brand_ai
  logs: data/logs
  fixtures: fixtures
  prompts: data/prompts        # saved per-agent prompt overrides (overrides.json)
